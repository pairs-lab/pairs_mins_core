# do not modify these
root: ./
name: simulation
socket_name: mrs
attach: false
tmux_options: -f /etc/ctu-mrs/tmux.conf
# you can modify these
pre_window: export UAV_NAME=uav1; export RUN_TYPE=simulation; export UAV_TYPE=f330; export SENSORS=""
startup_window: status
windows:
  - roscore:
      layout: tiled
      panes:
        - roscore
  - gazebo:
      layout: tiled
      panes:
        - waitForRos; roslaunch pairs_uav_gazebo_simulation simulation.launch world_name:=forest gui:=true
        - waitForControl; gz camera -c gzclient_camera -f $UAV_NAME; history -s gz camera -c gzclient_camera -f $UAV_NAME
  - status:
      layout: tiled
      panes:
        - waitForHw; roslaunch pairs_uav_status status.launch
  - spawn:
      layout: tiled
      panes:
        - waitForGazebo; rosservice call /pairs_drone_spawner/spawn "1 $UAV_TYPE --enable-vio --enable-ground-truth --pos 0 0 0 0"
  - hw_api:
      layout: tiled
      panes:
        - waitForTime; roslaunch pairs_uav_px4_api api.launch
  - core:
      layout: tiled
      panes:
        - waitForHw; roslaunch pairs_uav_core core.launch
          platform_config:=`rospack find pairs_uav_gazebo_simulation`/config/pairs_uav_system/$UAV_TYPE.yaml
          world_config:=./custom_configs/world_config.yaml
          network_config:=./custom_configs/network_config.yaml
          custom_config:=./custom_configs/custom_config.yaml
  - mins:
      layout: tiled
      panes:
        - waitForHw; roslaunch pairs_mins_core simulation_bluefox.launch
  # - vins_republisher:
  #     layout: tiled
  #     panes:
  #       - waitForHw; roslaunch pairs_vins_republisher vins_republisher_openvins_bluefox.launch
  - change_odom_source:
      layout: tiled
      panes:
        -  waitForOffboard; sleep 10; rosservice call /$UAV_NAME/estimation_manager/change_estimator "mins"
  - takeoff:
      layout: tiled
      panes:
        - waitForHw; roslaunch pairs_uav_autostart automatic_start.launch
        - 'waitForControl; rosservice call /$UAV_NAME/hw_api/arming 1; sleep 2; rosservice call /$UAV_NAME/hw_api/offboard'
  - goto:
      layout: tiled
      panes:
        - 'history -s rosservice call /$UAV_NAME/control_manager/goto \"goal: \[0.0, 10.0, 1.5, 0.0\]\"'
  - rviz:
      layout: tiled
      panes:
        - waitForControl; roslaunch pairs_mins_core rviz.launch
        # - waitForControl; roslaunch pairs_rviz_plugins load_robot.launch
        - waitForTime; waitForControl; roslaunch pairs_rviz_plugins rviz_interface.launch
  - layout:
      layout: tiled
      panes:
        - waitForControl; sleep 3; ~/.i3/layout_manager.sh ./layout.json
